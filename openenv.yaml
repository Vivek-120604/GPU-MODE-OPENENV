spec_version: 1
name: bio_env
type: environment
runtime: docker
app: server.app:app
port: 7860

tasks:
  - name: easy
    description: Easy biological optimization task with close initial conditions
    grader:
      metric: final_performance_score
      endpoint: /grade
      threshold: 0.60
      score_range: [0.001, 0.999]

  - name: medium
    description: Medium biological optimization task with moderate initial conditions
    grader:
      metric: final_performance_score
      endpoint: /grade
      threshold: 0.75
      score_range: [0.001, 0.999]

  - name: hard
    description: Hard biological optimization task with challenging initial conditions
    grader:
      metric: final_performance_score
      endpoint: /grade
      threshold: 0.85
      score_range: [0.001, 0.999]
      
